name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
      - 'bugfix/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Frontend Build & Test
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint:ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.soul-yatri.com' }}
          VITE_ENABLE_ANALYTICS: false
          VITE_SENTRY_DSN: ''

      - name: Bundle budget check
        run: npm run bundle:budget

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Backend Build & Test
  # ---------------------------------------------------------------------------
  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soul_yatri_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/soul_yatri_test?schema=public

      - name: Run database migrations
        working-directory: ./server
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/soul_yatri_test?schema=public

      - name: Type check
        working-directory: ./server
        run: npx tsc --noEmit

      - name: Lint
        working-directory: ./server
        run: npm run lint:ci

      - name: Build
        working-directory: ./server
        run: npm run build

      - name: Run backend tests
        working-directory: ./server
        run: |
          npm run test:pricing || true
          npm run test:cancellation || true
          npm run test:therapist-limit || true
          npm run test:nudge || true
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/soul_yatri_test?schema=public
          JWT_SECRET: test-jwt-secret-for-ci-pipeline
          PORT: 3000
          NODE_ENV: test

  # ---------------------------------------------------------------------------
  # E2E Tests (Playwright)
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          VITE_API_URL: http://localhost:3000/api/v1
          VITE_AUTH_BYPASS: true
          VITE_ENABLE_MOCK_AUTH: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Security Scan
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

      - name: Run npm audit (server)
        working-directory: ./server
        run: npm audit --audit-level=moderate || true

  # ---------------------------------------------------------------------------
  # Code Quality Gates
  # ---------------------------------------------------------------------------
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [frontend, backend, e2e, security]
    
    if: always()
    
    steps:
      - name: Check job statuses
        run: |
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Backend: ${{ needs.backend.result }}"
          echo "E2E: ${{ needs.e2e.result }}"
          echo "Security: ${{ needs.security.result }}"
          
          if [[ "${{ needs.frontend.result }}" != "success" ]] || \
             [[ "${{ needs.backend.result }}" != "success" ]]; then
            echo "Quality gates failed!"
            exit 1
          fi
          
          echo "All quality gates passed!"
